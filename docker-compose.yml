version: '3.8'

services:
  mcp-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-adapter
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AVAILABILITY_API_URL: ${AVAILABILITY_API_URL:-https://xtlhldok3e.execute-api.ap-south-1.amazonaws.com/TDConAir/vehicle/availability}
      BOOKING_API_URL: ${BOOKING_API_URL:-https://vertex.lageego.com/booking/createbooking}
      FARE_API_URL: ${FARE_API_URL:-https://vertex.lageego.com/booking/getestimatedfare}
      DEBUG: ${DEBUG:-False}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
